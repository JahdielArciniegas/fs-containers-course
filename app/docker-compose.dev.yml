services:
  frontend:
    image: ecommerce-frontend
    build:
      context: ./Frontend
      dockerfile: dev.Dockerfile
    volumes:
      - ./Frontend:/app
    environment:
      - VITE_API_URL=http://localhost:8080/api
    container_name: ecommerce-frontend
  backend:
    image: ecommerce-backend
    build:
      context: ./Backend
      dockerfile: dev.Dockerfile
    volumes:
      - ./Backend:/app
    environment:
      - MONGO_URI=mongodb://root:root@mongo:27017/ecommerce?authSource=admin
      - JWT_SECRET=miClaveSecreta123
      - CLIENT_URL=http://localhost:8080
    container_name: ecommerce-backend
    depends_on:
      - mongo
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    container_name: ecommerce-nginx
    depends_on:
      - frontend
      - backend
  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
      - MONGO_INITDB_DATABASE=ecommerce
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
